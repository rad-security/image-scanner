name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_GITHUB_RUNNER_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_RUNNER_SECRET_KEY }}
          aws-region: us-east-1
      - name: Login to Public Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # Pinned to keep the release in lockstep with the validated config.
          version: 'v2.4.4'
          args: release --clean
        env:
          # Default token: in-repo release assets + ghcr push.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to rad-security/homebrew, used only to
          # publish the Homebrew formula to the shared tap.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
