version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - unconvert
    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    errcheck:
      # Close on read paths and best-effort cleanup do not yield
      # actionable errors; meaningful Close failures are checked explicitly.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*compress/gzip.Reader).Close
        - os.Remove
        # Terminal/diagnostic output — a failed write to stderr is not
        # actionable. File writes go through os.WriteFile, which is checked.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
